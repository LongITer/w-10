# ConstraintTemplate: Block hostNetwork: true
# Risk: Security - Containers sử dụng host network namespace
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockhoststnetwork
spec:
  crd:
    spec:
      names:
        kind: K8sBlockHostNetwork
      validation:
        openAPIV3Schema:
          properties:
            message:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblockhoststnetwork
        
        violation[{"msg": msg}] {
            spec := input.review.object.spec
            spec.hostNetwork == true
            msg := "Pod is using host network (hostNetwork: true). Pods must use container network namespace."
        }

---
# Constraint: Block host network access
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockHostNetwork
metadata:
  name: block-host-network
spec:
  match:
    namespaceSelector:
      matchExpressions:
      - key: gatekeeper
        operator: In
        values: ["enabled"]
    excludedNamespaces: ["kube-system", "kube-public", "gatekeeper-system"]
  parameters:
    message: "Pods must not use host network (hostNetwork: true)"
