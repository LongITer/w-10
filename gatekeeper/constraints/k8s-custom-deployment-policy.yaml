# ConstraintTemplate: Custom Deployment policy for lab 1.3
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8scustomdeploymentpolicy
spec:
  crd:
    spec:
      names:
        kind: K8sCustomDeploymentPolicy
      validation:
        openAPIV3Schema:
          properties:
            maxReplicas:
              type: integer
            requiredLabel:
              type: string
            allowedRegistryPrefixes:
              type: array
              items:
                type: string
          type: object
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8scustomdeploymentpolicy

        violation[{"msg": msg}] {
            input.review.kind.kind == "Deployment"
            replicas := input.review.object.spec.replicas
            replicas != null
            replicas > input.parameters.maxReplicas
            msg := sprintf("Deployment replicas (%v) cannot exceed %v.", [replicas, input.parameters.maxReplicas])
        }

        violation[{"msg": msg}] {
            input.review.kind.kind == "Deployment"
            required := input.parameters.requiredLabel
            not input.review.object.metadata.labels[required]
            msg := sprintf("Deployment must have label '%v'.", [required])
        }

        violation[{"msg": msg}] {
            input.review.kind.kind == "Deployment"
            container := input.review.object.spec.template.spec.containers[_]
            not image_allowed(container.image, input.parameters.allowedRegistryPrefixes)
            msg := sprintf("Container image '%v' is not from an allowed registry.", [container.image])
        }

        image_allowed(image, prefixes) {
            prefix := prefixes[_]
            startswith(image, prefix)
        }

---
# Constraint: Enforce the custom deployment policy
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sCustomDeploymentPolicy
metadata:
  name: custom-deployment-policy
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaceSelector:
      matchLabels:
        gatekeeper: "enabled"
    excludedNamespaces: ["kube-system", "kube-public", "gatekeeper-system"]
  parameters:
    maxReplicas: 5
    requiredLabel: owner
    allowedRegistryPrefixes:
      - "ghcr.io/Vuong-Bach/"
