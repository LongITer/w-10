# ConstraintTemplate: Block :latest images
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredimagetag
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredImageTag
      validation:
        openAPIV3Schema:
          type: object
          properties:
            message:
              type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredimagetag

        kind := input.review.kind.kind

        pod_spec := input.review.object.spec {
            kind != "Deployment"
        }

        pod_spec := input.review.object.spec.template.spec {
            kind == "Deployment"
        }

        container := pod_spec.containers[_]
        image := container.image

        violation[{"msg": msg}] {
            not regex.match(":.+$", image)
            msg := sprintf("Image '%v' must include a version tag. :latest is not allowed.", [image])
        }

        violation[{"msg": msg}] {
            endswith(image, ":latest")
            msg := sprintf("Image '%v' uses :latest tag which is not allowed.", [image])
        }

---
# Constraint: Cấm image tag :latest
# Risk: F-01 - Image tag không xác định phiên bản chính xác
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequiredImageTag
metadata:
  name: image-no-latest
spec:
  enforcementAction: deny
  match:
    namespaceSelector:
      matchLabels:
        gatekeeper: "enabled"
  parameters:
    message: "Images must not use ':latest' tag. Specify exact version tag."
