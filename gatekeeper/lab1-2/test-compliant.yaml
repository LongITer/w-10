# Test Compliant: Pass all 4 Gatekeeper constraints
# Expected: ACCEPTED by all constraints
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-compliant
  namespace: demo
  labels:
    owner: team-default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-compliant
  template:
    metadata:
      labels:
        app: test-compliant
        owner: team-default
    spec:
      containers:
      - name: app
        image: ghcr.io/Vuong-Bach/w10-api:0.0.1  # ✓ Specific version tag from allowed registry
        resources:
          limits:  # ✓ Has resource limits
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
        securityContext:
          runAsUser: 1000  # ✓ Non-root user
          allowPrivilegeEscalation: false
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
