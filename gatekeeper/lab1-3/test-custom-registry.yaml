# Test custom policy: disallowed registry should be rejected
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-custom-registry
  namespace: demo
  labels:
    app: test-custom-registry
    owner: team-a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-custom-registry
  template:
    metadata:
      labels:
        app: test-custom-registry
        owner: team-a
    spec:
      containers:
      - name: app
        image: docker.io/library/nginx:1.21 # ❌ VIOLATION: registry not allowed by custom policy
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
        securityContext:
          runAsUser: 1000
