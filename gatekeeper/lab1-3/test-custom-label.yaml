# Test custom policy: missing owner label should be rejected
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-custom-label
  namespace: demo
  labels:
    app: test-custom-label
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-custom-label
  template:
    metadata:
      labels:
        app: test-custom-label
    spec:
      containers:
      - name: app
        image: ghcr.io/Vuong-Bach/w10-api:0.0.1
        # ❌ VIOLATION: missing required owner label on Deployment metadata and pod template metadata
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
        securityContext:
          runAsUser: 1000
