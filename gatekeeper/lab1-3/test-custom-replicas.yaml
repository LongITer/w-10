# Test custom policy: replicas > 5 should be rejected
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-custom-replicas
  namespace: demo
  labels:
    app: test-custom-replicas
    owner: team-a
spec:
  replicas: 6 # ❌ VIOLATION: replicas > 5
  selector:
    matchLabels:
      app: test-custom-replicas
  template:
    metadata:
      labels:
        app: test-custom-replicas
        owner: team-a
    spec:
      containers:
      - name: app
        image: ghcr.io/Vuong-Bach/w10-api:0.0.1
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
        securityContext:
          runAsUser: 1000
